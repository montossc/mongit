<!doctype html>
<html lang="en" data-theme="system">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>mongit</title>
		<script>
			// Theme bootstrap — runs synchronously before first paint to prevent FOUC
			(function() {
				try {
					var theme = localStorage.getItem('mongit-theme');
					if (theme === 'light' || theme === 'dark' || theme === 'system') {
						document.documentElement.setAttribute('data-theme', theme);
					}
					// If no stored preference, 'system' is already the default from the HTML attribute
				} catch(e) {
					// localStorage may be unavailable; 'system' default remains
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
